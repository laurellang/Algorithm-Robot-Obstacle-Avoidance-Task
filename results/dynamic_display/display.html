                    btn.addEventListener('click', function() {
                        selectAlgorithm(this.dataset.algo);
                    });
                });
                
                // 生成对比表
                generateComparisonTable();
                
                // 默认选择第一个算法
                selectAlgorithm('A*');
            } catch (error) {
                console.error('初始化失败:', error);
                document.getElementById('statusMessage').textContent = 
                    '❌ 初始化失败';
            }
        }
        
        // 选择算法
        function selectAlgorithm(algoName) {
            if (!allAlgorithmsData || !allAlgorithmsData.algorithms[algoName]) {
                return;
            }
            
            // 更新按钮状态
            document.querySelectorAll('.algo-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.algo === algoName) {
                    btn.classList.add('active');
                }
            });
            
            currentAlgorithm = algoName;
            resetSimulation();
            updateAlgoInfo();
        }
        
        // 更新算法信息
        function updateAlgoInfo() {
            const algoData = allAlgorithmsData.algorithms[currentAlgorithm];
            
            document.getElementById('algoName').textContent = currentAlgorithm;
            document.getElementById('pathLength').textContent = algoData.path_length;
            document.getElementById('exploredCount').textContent = algoData.explored_count;
            document.getElementById('successStatus').textContent = algoData.success ? '✅ 成功' : '❌ 失败';
            document.getElementById('currentStep').textContent = `0 / ${algoData.path_length}`;
            document.getElementById('currentPos').textContent = '-';
            
            // 更新按钮样式
            const activeBtn = document.querySelector('.algo-btn.active');
            if (activeBtn) {
                if (!algoData.success) {
                    activeBtn.classList.add('failed');
                } else {
                    activeBtn.classList.remove('failed');
                }
            }
        }
        
        // 生成对比表
        function generateComparisonTable() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            
            const algorithms = Object.keys(allAlgorithmsData.algorithms);
            const pathLengths = algorithms.map(a => allAlgorithmsData.algorithms[a].path_length);
            const maxPathLength = Math.max(...pathLengths);
            
            algorithms.forEach(algoName => {
                const data = allAlgorithmsData.algorithms[algoName];
                const efficiency = ((maxPathLength - data.path_length) / maxPathLength * 100).toFixed(1);
                
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td class="algo-name">${algoName}</td>
                    <td>${data.path_length}</td>
                    <td>${data.explored_count}</td>
                    <td class="${data.success ? 'status-success' : 'status-fail'}">
                        ${data.success ? '✅ 成功' : '❌ 失败'}
                    </td>
                    <td>${efficiency}%</td>
                `;
                tbody.appendChild(row);
            });
        }
        
        // 绘制地图
        function draw() {
            if (!allAlgorithmsData || !currentAlgorithm) return;
            
            const algoData = allAlgorithmsData.algorithms[currentAlgorithm];
            const grid = allAlgorithmsData.grid;
            
            // 清空画布
            ctx.fillStyle = COLORS.empty;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 绘制网格线
            ctx.strokeStyle = COLORS.grid;
            ctx.lineWidth = 0.5;
            for (let i = 0; i <= 15; i++) {
                ctx.beginPath();
                ctx.moveTo(i * CELL_SIZE, 0);
                ctx.lineTo(i * CELL_SIZE, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * CELL_SIZE);
                ctx.lineTo(canvas.width, i * CELL_SIZE);
                ctx.stroke();
            }
            
            // 绘制障碍物
            grid.forEach((row, r) => {
                row.forEach((cell, c) => {
                    if (cell === 1) {
                        ctx.fillStyle = COLORS.obstacle;
                        ctx.fillRect(c * CELL_SIZE, r * CELL_SIZE, CELL_SIZE, CELL_SIZE);
                    }
                });
            });
            
            // 绘制已探索的区域
            algoData.explored.slice(0, currentStep).forEach(([r, c]) => {
                ctx.fillStyle = COLORS.explored;
                ctx.fillRect(c * CELL_SIZE + 2, r * CELL_SIZE + 2, CELL_SIZE - 4, CELL_SIZE - 4);
            });
            
            // 绘制最终路径
            if (currentStep >= algoData.path.length) {
                drawPath(algoData.path);
            } else if (currentStep > 0) {
                drawPath(algoData.path.slice(0, currentStep + 1));
            }
            
            // 绘制起点
            const start = allAlgorithmsData.start;
            drawCell(start.y, start.x, COLORS.start, 'S');
            
            // 绘制终点
            const end = allAlgorithmsData.end;
            drawCell(end.y, end.x, COLORS.end, 'E');
            
            // 绘制当前位置
            if (currentStep < algoData.path.length) {
                const current = algoData.path[currentStep];
                drawRobot(current[0], current[1]);
            }
        }
        
        // 绘制路径
        function drawPath(path) {
            if (path.length < 2) return;
            
            ctx.strokeStyle = COLORS.path;
            ctx.lineWidth = 3;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            
            ctx.beginPath();
            ctx.moveTo(path[0][1] * CELL_SIZE + CELL_SIZE / 2, 
                      path[0][0] * CELL_SIZE + CELL_SIZE / 2);
            
            for (let i = 1; i < path.length; i++) {
                ctx.lineTo(path[i][1] * CELL_SIZE + CELL_SIZE / 2, 
                          path[i][0] * CELL_SIZE + CELL_SIZE / 2);
            }
            ctx.stroke();
        }
        
        // 绘制单个格子
        function drawCell(r, c, color, text) {
            ctx.fillStyle = color;
            ctx.fillRect(c * CELL_SIZE + 2, r * CELL_SIZE + 2, CELL_SIZE - 4, CELL_SIZE - 4);
            
            if (text) {
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 14px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(text, c * CELL_SIZE + CELL_SIZE / 2, r * CELL_SIZE + CELL_SIZE / 2);
            }
        }
        
        // 绘制机器人
        function drawRobot(r, c) {
            ctx.fillStyle = COLORS.robot;
            ctx.beginPath();
            ctx.arc(c * CELL_SIZE + CELL_SIZE / 2, r * CELL_SIZE + CELL_SIZE / 2, 
                   CELL_SIZE / 2.5, 0, Math.PI * 2);
            ctx.fill();
        }
        
        // 更新进度和信息
        function updateProgress() {
            const algoData = allAlgorithmsData.algorithms[currentAlgorithm];
            const progress = (currentStep / algoData.path.length) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
            
            if (currentStep < algoData.path.length) {
                const pos = algoData.path[currentStep];
                document.getElementById('currentPos').textContent = `(${pos[0]}, ${pos[1]})`;
            }
            document.getElementById('currentStep').textContent = 
                `${currentStep} / ${algoData.path.length}`;
        }
        
        // 启动模拟
        function startSimulation() {
            if (!currentAlgorithm) return;
            if (isRunning) return;
            
            isRunning = true;
            isPaused = false;
            
            document.getElementById('statusMessage').className = 'status-message status-running';
            document.getElementById('statusMessage').textContent = 
                `▶️ 正在运行 ${currentAlgorithm} 算法...`;
            
            currentStep = 0;
            animate();
        }
        
        function pauseSimulation() {
            if (!isRunning) return;
            isPaused = true;
            if (animationInterval) clearInterval(animationInterval);
            
            document.getElementById('statusMessage').className = 'status-message status-waiting';
            document.getElementById('statusMessage').textContent = '⏸️ 已暂停';
        }
        
        function resumeSimulation() {
            if (!isRunning || !isPaused) return;
            isPaused = false;
            
            document.getElementById('statusMessage').className = 'status-message status-running';
            document.getElementById('statusMessage').textContent = 
                `▶️ 继续运行 ${currentAlgorithm} 算法...`;
            
            animate();
        }
        
        function resetSimulation() {
            isRunning = false;
            isPaused = false;
            currentStep = 0;
            if (animationInterval) clearInterval(animationInterval);
            
            updateProgress();
            draw();
            
            const algoData = allAlgorithmsData.algorithms[currentAlgorithm];
            if (algoData.success) {
                document.getElementById('statusMessage').className = 'status-message status-waiting';
                document.getElementById('statusMessage').textContent = 
                    `📋 ${currentAlgorithm} - 点击 "开始" 启动演示`;
            } else {
                document.getElementById('statusMessage').className = 'status-message status-fail';
                document.getElementById('statusMessage').textContent = 
                    `❌ ${currentAlgorithm} - 失败（陷入局部极小值）`;
            }
        }
        
        function skipToEnd() {
            if (!currentAlgorithm) return;
            
            isRunning = false;
            isPaused = false;
            if (animationInterval) clearInterval(animationInterval);
            
            const algoData = allAlgorithmsData.algorithms[currentAlgorithm];
            currentStep = algoData.path.length - 1;
            updateProgress();
            draw();
            
            if (algoData.success) {
                document.getElementById('statusMessage').className = 'status-message status-success';
                document.getElementById('statusMessage').textContent = 
                    `✅ ${currentAlgorithm} 成功找到路径！`;
            } else {
                document.getElementById('statusMessage').className = 'status-message status-fail';
                document.getElementById('statusMessage').textContent = 
                    `❌ ${currentAlgorithm} 失败`;
            }
        }
        
        function animate() {
            if (!isRunning || isPaused) return;
            
            const algoData = allAlgorithmsData.algorithms[currentAlgorithm];
            
            if (currentStep < algoData.path.length - 1) {
                currentStep++;
                updateProgress();
                draw();
                
                const interval = Math.max(50, 500 / animationSpeed);
                animationInterval = setTimeout(animate, interval);
            } else {
                isRunning = false;
                document.getElementById('statusMessage').className = 'status-message status-success';
                document.getElementById('statusMessage').textContent = 
                    `✅ ${currentAlgorithm} 演示完成！`;
            }
        }
        
        function updateSpeed(value) {
            animationSpeed = parseInt(value);
            document.getElementById('speedValue').textContent = animationSpeed + 'x';
        }
        
        // 页面加载完成后初始化
        window.addEventListener('load', initVisualization);
    </script>
</body>
</html>
